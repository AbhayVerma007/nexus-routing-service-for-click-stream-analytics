version: '3.8'

services:
  app:
    build: .
    ports:
      - '3000:3000'
    env_file: .env
    depends_on:
      mongo:
        condition: service_healthy
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules # Don't overwrite container's node_modules with local ones

  mongo:
    image: mongo:6
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: super_secret_root_password # (You can make this anything)
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASS}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      # Auto-run SQL on first start
      - ./migrations:/docker-entrypoint-initdb.d 
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  mysql_data: